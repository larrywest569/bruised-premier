name: agreement
on:
  push:
    branches: [ "main" ]

jobs:
    before:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: before
          run: |
            npm install
            timeout 340m node agreement.js
  
